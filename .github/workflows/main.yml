name: Build & Release 🚀
permissions:
  contents: write

on:
  push:
    branches: [main]

env:
  PROJECT_NAME: Pong_Multiplayer
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build Unity 🎮
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true
          fetch-depth: 0 

      - uses: actions/cache@v3
        with:
          path: Library
          key: Library-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}

      - name: Build Unity Project
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          targetPlatform: StandaloneWindows64
          buildName: Build

      - name: Zip Build
        run: |
          cd build
          zip -r "../${PROJECT_NAME}_Windows_temp.zip" .
          cd ..

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-zip
          path: ${{ env.PROJECT_NAME }}_Windows_temp.zip          

  release:
    name: Semantic Release 🧠
    runs-on: ubuntu-latest
    needs: build 
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download Build Artifact
        uses: actions/download-artifact@v4
        with:
          name: build-zip

      - name: Run Semantic Release
        id: semantic
        uses: cycjimmy/semantic-release-action@v4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          branches: main

      - name: Rename & Upload Release Asset
        if: steps.semantic.outputs.new_release_published == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SEMVER: ${{ steps.semantic.outputs.new_release_version }}
        run: |
          # Aqui ${PROJECT_NAME} funciona porque é um comando de shell (run)
          mv ${PROJECT_NAME}_Windows_temp.zip ${PROJECT_NAME}_Windows_${SEMVER}.zip
          gh release upload v${SEMVER} ${PROJECT_NAME}_Windows_${SEMVER}.zip

      - name: Notify Discord 📢
        if: steps.semantic.outputs.new_release_published == 'true'
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          RELEASE_TAG: ${{ steps.semantic.outputs.new_release_version }}
          RELEASE_BODY: ${{ steps.semantic.outputs.new_release_notes }}
          REPO_URL: ${{ github.event.repository.html_url }}
          REPO_NAME: ${{ github.repository }}

        run: |
          # Formata o corpo da release
          RAW_BODY=$(echo "${RELEASE_BODY}" | sed '1,2d' \
                    | sed 's/### Features/🚀 **Features**/g' \
                    | sed 's/### Bug Fixes/🐛 **Bug Fixes**/g' \
                    | sed 's/### Performance Improvements/⚡ **Performance**/g' \
                    | sed 's/### BREAKING CHANGES/⚠️ **BREAKING CHANGES**/g' \
                    | sed 's/^\* /🔹 /g' \
                    | sed 's/^- /🔹 /g' \
                    | tr -s '\n')

          # Variáveis extras para os links e rodapé
          FUNNY_MESSAGE="Já se alongaram os dedos antes de trabalhar?"
          RELEASE_LINK="${REPO_URL}/releases/tag/v${RELEASE_TAG}"
          ISSUE_LINK="${REPO_URL}/issues/new"
          CURRENT_DATE=$(date +'%d/%m/%Y')

          # Mensagem final em Markdown puro
          FULL_MESSAGE=$(printf "📢 **@everyone | Nova Versão Disponível!**\n_%s_\n\n**Repositório:** [%s](%s)\n**Release:** [v%s](%s)\n**Versão:** \`v%s\`\n\n**O que mudou:**\n%s\n\n---\n📅 %s | 🛠️ [Abrir uma Issue](%s)" \
            "$FUNNY_MESSAGE" \
            "$REPO_NAME" "$REPO_URL" \
            "$RELEASE_TAG" "$RELEASE_URL" \
            "$RELEASE_TAG" \
            "$RAW_BODY" \
            "$CURRENT_DATE" "$ISSUE_LINK")

          # Transforma em JSON seguro
          JSON_PAYLOAD=$(jq -n --arg msg "$FULL_MESSAGE" '{content: $msg}')

          # Envia para o Discord
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
            -H "Content-Type: application/json" \
            -d "$JSON_PAYLOAD" "$DISCORD_WEBHOOK")

          if [ "$HTTP_STATUS" -eq 204 ] || [ "$HTTP_STATUS" -eq 200 ]; then
            echo "✅ Notificação enviada!"
          else
            echo "❌ Erro HTTP: $HTTP_STATUS"
            exit 1
          fi